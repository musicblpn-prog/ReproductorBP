<head>

  <!-- =====================================
       META
  ===================================== -->

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Mi Music</title>


  <!-- =====================================
       CSS
  ===================================== -->

  <link rel="stylesheet" href="styles.css" />


</head>

<body>

<div class="app">

  <!-- =====================================
       TOP BAR
  ===================================== -->

  <header class="topbar">

    <div class="brand">

      <div class="dot"></div>

      <div>
        <h1>Mi Music</h1>
        <p>Biblioteca personal</p>
      </div>

    </div>


    <!-- BOTONES SUPERIORES -->

    <div class="top-actions">

      <button id="btnAdd" class="btn primary" type="button">
        Agregar
      </button>

      <button id="btnExport" class="btnGlass small">
        Exportar
      </button>

      <button id="btnImport" class="btnGlass small">
        Importar
      </button>

      <input
        type="file"
        id="fileImport"
        accept=".json"
        style="display:none"
      />

    </div>

  </header>


    <!-- =====================================
       LAYOUT PRINCIPAL
  ===================================== -->

  <main class="layout">


    <!-- =====================================
         SIDEBAR
    ===================================== -->

    <aside class="sidebar">

      <div class="search">

        <input
          id="searchInput"
          type="search"
          placeholder="Buscar canción, artista, álbum…"
        />

      </div>


      <!-- NAV -->

      <div class="nav">

        <button id="navGenres" class="nav-btn active">
          Géneros
        </button>

        <button id="navAlbums" class="nav-btn">
          Álbumes
        </button>

        <button id="navSongs" class="nav-btn">
          Canciones
        </button>

        <button id="navCollections" class="nav-btn">
          Colecciones
        </button>

      </div>


      <div class="hint">
        Consejo: usa links directos de Drive
      </div>

    </aside>



    <!-- =====================================
         CONTENT
    ===================================== -->

    <section class="content">

      <div class="crumbs" id="crumbs">
        <span class="crumb strong">Géneros</span>
      </div>


      <div id="list" class="grid"></div>


      <div id="empty" class="empty hidden">

        <h2>Tu biblioteca está vacía</h2>

        <p>Agrega tu primera canción</p>

        <button id="btnAdd2" class="btn primary">
          Agregar canción
        </button>

      </div>

    </section>

  </main>


    <!-- =====================================
       MINI PLAYER
  ===================================== -->

  <footer class="player">

    <div class="np">

      <div id="cover" class="cover">♪</div>

      <div class="np-meta">

        <div id="npTitle" class="np-title">
          Nada reproduciendo
        </div>

        <div id="npSub" class="np-sub">
          —
        </div>

      </div>

    </div>



    <div class="p-controls">

      <button id="prevBtn" class="btn icon">⏮</button>

      <button id="playBtn" class="btn icon big">▶</button>

      <button id="nextBtn" class="btn icon">⏭</button>


      <div class="timebar">

        <span id="tCur" class="time">0:00</span>

        <input
          id="seek"
          type="range"
          min="0"
          max="100"
          value="0"
          step="0.1"
        />

        <span id="tDur" class="time">0:00</span>

      </div>

    </div>



    <div class="p-right">

      <div class="vol">

        <span>🔊</span>

        <input
          id="vol"
          type="range"
          min="0"
          max="1"
          value="0.9"
          step="0.01"
        />

      </div>

    </div>


    <audio
      id="audio"
      preload="auto"
      playsinline
      webkit-playsinline>
    </audio>

  </footer>


  <!-- =====================================
     MODAL AGREGAR CANCIÓN
===================================== -->

<div id="modal" class="modal modal-hidden">

  <div class="modal-card">

    <div class="modal-head">

      <h2>Agregar canción</h2>

      <button id="closeModal" class="btn icon">✕</button>

    </div>


    <div class="form">

      <label>
        Nombre
        <input id="inTitle" type="text">
      </label>

      <label>
        Artista
        <input id="inArtist" type="text">
      </label>

      <label>
        Género
        <input id="inGenre" type="text">
      </label>

      <label>
        Álbum
        <input id="inAlbum" type="text">
      </label>

      <label>
        URL MP3
        <input id="inUrl" type="url">
      </label>

      <label>
        Cover
        <input id="inCover" type="url">
      </label>


      <div class="form-actions">

        <button id="saveSong" class="btn primary">
          Guardar
        </button>

        <button id="cancelSong" class="btn">
          Cancelar
        </button>

      </div>

      <div id="msg" class="msg hidden"></div>

    </div>

  </div>

</div>

<!-- =====================================
     FULL PLAYER
===================================== -->

<div id="nowPlaying" class="now-playing np-hidden">


  <!-- fondo blur dinámico -->

  <div id="npBg" class="now-playing-bg"></div>
  <div class="now-playing-overlay"></div>



  <div class="np-header">

    <button id="closeNowPlaying">
      ⬇
    </button>

    <span>Reproduciendo</span>

  </div>



  <div class="np-body">


    <div id="bigCover" class="big-cover">
      ♪
    </div>


    <h2 id="bigTitle">Título</h2>

    <p id="bigArtist">Artista</p>



    <div class="np-controls">

      <button id="shuffleFull" class="circle-btn">🔀</button>

      <button id="prevFull" class="circle-btn">⏮</button>

      <button id="playFull" class="circle-btn play-main">▶</button>

      <button id="nextFull" class="circle-btn">⏭</button>

      <button id="repeatFull" class="circle-btn">🔁</button>

    </div>


    <input
      id="seekFull"
      type="range"
      min="0"
      max="100"
      value="0"
    />


    <div class="np-extra">

      <button id="favFullBtn" class="circle-btn">
        🤍
      </button>


      <select id="speedControl">

        <option value="1">1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>

      </select>

    </div>

  </div>

</div>
