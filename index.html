<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<link rel="stylesheet" href="styles.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

</head>

<body>

<header class="header">
<h1 class="app-title">Mi Música</h1>

<input id="searchInput" placeholder="Buscar canción..." />
</header>


<main>

<div id="library"></div>

</main>


<!-- MINI PLAYER -->
<div id="miniPlayer" class="mini-player">

<img id="miniCover" src="" alt="">

<div class="mini-info">
<div id="miniTitle">No song</div>
<div id="miniArtist"></div>
</div>

<div class="mini-controls">

<button id="prevBtn">⏮</button>
<button id="playBtn">▶</button>
<button id="nextBtn">⏭</button>

</div>

</div>


<!-- NOW PLAYING -->
<div id="nowPlaying" class="now-playing hidden">

<img id="coverFull" src="" alt="">

<h2 id="titleFull"></h2>
<h3 id="artistFull"></h3>

<input id="seekFull" type="range" min="0" max="100" value="0">

<div class="np-controls">

<button id="prevFull">⏮</button>
<button id="playFull">▶</button>
<button id="nextFull">⏭</button>

</div>

</div>


<!-- AUDIO ENGINE -->
<audio id="audio" preload="auto" playsinline webkit-playsinline></audio>

<script src="script.js"></script>

</body>
</html>
